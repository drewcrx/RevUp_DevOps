name: RevUp CI/CD

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Validar aplicación Flask
        run: python -m compileall app.py

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_LDGS }}

      - name: Construir imagen Docker
        run: docker build -t ghcr.io/drewcrx/revup-web:1.0.0 .

      - name: Publicar imagen en GHCR
        run: docker push ghcr.io/drewcrx/revup-web:1.0.0

      - name: Probar conexión SSH en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "Conexión SSH correcta"

      - name: Pasar stack al VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: "stack.yml,Makefile"
          target: "/home/${{ secrets.VPS_USER }}/revup"

      - name: Desplegar stack en el VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /home/${{ secrets.VPS_USER }}/revup

            echo "==> Iniciando sesión en GHCR"
            echo "${{ secrets.GHCR_LDGS }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> Descargando la imagen desde GHCR"
            docker pull ghcr.io/drewcrx/revup-web:1.0.0

            echo "==> Desplegando stack"
            docker stack deploy -c stack.yml revup